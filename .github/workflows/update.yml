name: Update Content & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Generate content index
        run: python scripts/generate_index.py

      - name: Detect changes
        id: changes
        run: |
          git add js/data.js README.md
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchName = context.ref.replace("refs/heads/", "");

            const { data: ref } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${branchName}`,
            });

            const additions = [];
            const trackedFiles = ["js/data.js", "README.md"];

            for (const filePath of trackedFiles) {
              if (fs.existsSync(filePath)) {
                additions.push({
                  path: filePath,
                  contents: fs.readFileSync(filePath).toString("base64"),
                });
              }
            }

            if (additions.length === 0) {
              core.info("No files to commit");
              return;
            }

            const mutation = `
              mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `;

            const result = await github.graphql(mutation, {
              input: {
                branch: {
                  repositoryNameWithOwner: `${owner}/${repo}`,
                  branchName,
                },
                expectedHeadOid: ref.object.sha,
                message: {
                  headline: "Auto-update content index [skip ci]",
                },
                fileChanges: { additions },
              },
            });

            core.info(`Created commit: ${result.createCommitOnBranch.commit.url}`);

      - name: Re-checkout after API commit
        if: steps.changes.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
