name: Refresh Action SHAs

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Update action SHAs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          from urllib.request import Request, urlopen

          token = os.environ.get("GH_TOKEN")
          if not token:
            raise SystemExit("GH_TOKEN is required")

          pattern = re.compile(r"^(\s*-\s*uses:\s*)([^@\s]+)@([^\s#]+)(.*)$")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          cache = {}

          def resolve_sha(action, ref):
            repo = "/".join(action.split("/")[:2])
            key = f"{repo}@{ref}"
            if key in cache:
              return cache[key]
            url = f"https://api.github.com/repos/{repo}/commits/{ref}"
            req = Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
            })
            with urlopen(req) as response:
              data = json.load(response)
            cache[key] = data["sha"]
            return cache[key]

          workflow_dir = Path(".github/workflows")
          files = list(workflow_dir.glob("*.yml")) + list(workflow_dir.glob("*.yaml"))

          for path in files:
            lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
            updated = False
            new_lines = []

            for line in lines:
              match = pattern.match(line)
              if not match:
                new_lines.append(line)
                continue

              prefix, action, ref, _suffix = match.groups()
              if action.startswith("./") or action.startswith("docker://") or "$" + "{{" in action:
                new_lines.append(line)
                continue

              if sha_pattern.fullmatch(ref):
                new_lines.append(line)
                continue

              sha = resolve_sha(action, ref)
              new_lines.append(f"{prefix}{action}@{sha} # {ref}")
              updated = True

            if updated:
              path.write_text("\n".join(new_lines) + "\n", encoding="utf-8")

          PY

      - name: Commit changes (verified)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");

            try {
              execSync("git diff --quiet .github/workflows/");
              core.info("No changes to commit");
              return;
            } catch {
              // There are changes, continue
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = process.env.DEFAULT_BRANCH;

            const { data: ref } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${defaultBranch}`,
            });

            const changedFiles = execSync("git diff --name-only .github/workflows/")
              .toString()
              .trim()
              .split("\n")
              .filter(Boolean);

            const additions = changedFiles.map((filePath) => ({
              path: filePath,
              contents: fs.readFileSync(filePath).toString("base64"),
            }));

            if (additions.length === 0) {
              core.info("No files to commit");
              return;
            }

            const mutation = `
              mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `;

            try {
              const result = await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: defaultBranch,
                  },
                  expectedHeadOid: ref.object.sha,
                  message: { headline: "ci: refresh action SHAs" },
                  fileChanges: { additions },
                },
              });
              core.info(
                `Created verified commit: ${result.createCommitOnBranch.commit.url}`
              );
            } catch (err) {
              core.info(
                `Direct commit failed (${err.message}), creating branch and PR`
              );

              const date = new Date()
                .toISOString()
                .slice(0, 10)
                .replace(/-/g, "");
              const newBranch = `ci/refresh-action-shas-${date}`;

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${newBranch}`,
                sha: ref.object.sha,
              });

              await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: newBranch,
                  },
                  expectedHeadOid: ref.object.sha,
                  message: { headline: "ci: refresh action SHAs" },
                  fileChanges: { additions },
                },
              });

              const { data: pr } = await github.rest.pulls.create({
                owner,
                repo,
                head: newBranch,
                base: defaultBranch,
                title: "ci: refresh action SHAs",
                body: "## Summary\n- Pin GitHub Actions to full commit SHAs for reproducible runs\n- Keep workflow behavior unchanged\n",
              });
              core.info(`Created PR: ${pr.html_url}`);
            }
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
